<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RippleStorage 3D - 工商业储能产品系列</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --accent: #00d9a5; --accent-glow: rgba(0, 217, 165, 0.35); }
    body { margin: 0; overflow: hidden; background: #02060a; font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
    #css2d-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; pointer-events: none; }
    .glass {
      background: rgba(6, 16, 28, 0.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 12px 40px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .glass-accent { border-color: rgba(0, 217, 165, 0.18); box-shadow: 0 12px 40px rgba(0,0,0,0.55), 0 0 20px rgba(0,217,165,0.06), inset 0 1px 0 rgba(255,255,255,0.04); }
    .glow-text { text-shadow: 0 0 16px rgba(0, 217, 165, 0.6); }
    .btn-primary {
      background: linear-gradient(135deg, #00d9a5 0%, #00b386 100%);
      color: #02080f; font-weight: 700; transition: all .2s ease;
      box-shadow: 0 4px 14px rgba(0, 217, 165, 0.25);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(0, 217, 165, 0.4); }
    .btn-secondary {
      background: rgba(255,255,255,0.04);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all .2s ease;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); border-color: rgba(0,217,165,0.5); color: #fff; }
    .btn-tertiary {
      background: rgba(255,255,255,0.03);
      color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.06);
      transition: all .2s ease;
    }
    .btn-tertiary:hover { background: rgba(255,255,255,0.06); color: #e2e8f0; }
    .tag-badge {
      background: rgba(0, 217, 165, 0.10);
      color: #00d9a5;
      border: 1px solid rgba(0, 217, 165, 0.25);
    }
    .nav-item { transition: all .15s ease; border-left: 2px solid transparent; }
    .nav-item:hover { background: rgba(0,217,165,0.08); border-left-color: rgba(0,217,165,0.5); }
    .nav-item.active { background: rgba(0,217,165,0.14); border-left-color: #00d9a5; }
    .tab-btn { transition: all .18s ease; }
    .tab-btn.active { background: rgba(0,217,165,0.12); border-color: rgba(0,217,165,0.45); color: #00d9a5; box-shadow: 0 0 16px rgba(0,217,165,0.12); }
    .info-enter { animation: slideIn .35s ease both; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
    .pulse-dot { animation: pulse 2.2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,217,165,0.45); } 70% { box-shadow: 0 0 0 7px rgba(0,217,165,0); } 100% { box-shadow: 0 0 0 0 rgba(0,217,165,0); } }
    .stat-bar-bg { background: rgba(255,255,255,0.06); border-radius: 999px; height: 5px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 999px; transition: width .6s ease; }
    .label-card {
      background: rgba(4, 12, 22, 0.72);
      border: 1px solid rgba(0,217,165,0.35);
      border-radius: 8px;
      padding: 5px 10px;
      color: #00d9a5;
      font-size: 11px;
      font-weight: 600;
      pointer-events: none;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.45), 0 0 10px rgba(0,217,165,0.15);
      letter-spacing: 0.3px;
    }
    .spinner {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid rgba(0,217,165,0.15);
      border-top-color: #00d9a5;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading { transition: opacity .5s ease; }
    .hidden-fade { opacity: 0; pointer-events: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- Loading -->
  <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#02060a]">
    <div class="spinner mb-4"></div>
    <div class="text-slate-300 text-sm">正在加载 3D 场景...</div>
  </div>

  <div id="canvas-container"></div>
  <div id="css2d-container"></div>

  <!-- Header -->
  <div class="fixed top-0 left-0 right-0 z-20 flex items-center justify-between px-6 py-4 pointer-events-none">
    <div class="flex items-center gap-4 pointer-events-auto">
      <a href="/" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        <span class="text-sm font-medium hidden sm:inline">返回首页</span>
      </a>
      <div class="w-px h-5 bg-white/10 hidden sm:block"></div>
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-emerald-400 to-teal-600 flex items-center justify-center text-white font-bold shadow-lg shadow-emerald-500/20">R</div>
        <div>
          <h1 class="text-white text-lg font-semibold tracking-wide">RippleStorage <span class="text-emerald-400">3D</span></h1>
          <p class="text-slate-400 text-[11px]">工商业储能产品系列可视化</p>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-3 pointer-events-auto">
      <a href="/" class="btn-primary px-4 py-2 rounded-lg text-sm hidden sm:inline-flex items-center gap-2">
        <span>开始推演</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
    </div>
  </div>

  <!-- Product Switcher Tabs -->
  <div class="fixed top-[72px] left-1/2 -translate-x-1/2 z-20">
    <div class="glass glass-accent rounded-full px-2 py-1.5 flex items-center gap-1">
      <button class="tab-btn active px-4 py-2 rounded-full text-sm text-slate-300 border border-transparent font-medium" data-key="stacked">工商业堆叠一体机</button>
      <button class="tab-btn px-4 py-2 rounded-full text-sm text-slate-300 border border-transparent font-medium" data-key="cabinet">工商业户外柜</button>
      <button class="tab-btn px-4 py-2 rounded-full text-sm text-slate-300 border border-transparent font-medium" data-key="container">大型储能集装箱</button>
    </div>
  </div>

  <!-- Left Navigation Tree -->
  <div class="fixed top-[140px] left-6 bottom-28 w-60 glass rounded-xl p-3 z-20 flex flex-col hidden md:flex">
    <div class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider mb-2 px-2">部件导航</div>
    <div class="flex-1 overflow-y-auto space-y-1" id="part-nav"></div>
    <div class="mt-2 pt-2 border-t border-white/10 px-2">
      <button id="btn-tour" class="btn-primary w-full px-3 py-2.5 rounded-lg text-xs flex items-center justify-center gap-2">
        <span class="w-2 h-2 rounded-full bg-black/60 pulse-dot"></span>
        开启自动导览
      </button>
    </div>
  </div>

  <!-- Part Info Panel -->
  <div id="info-panel" class="fixed top-[140px] right-6 w-80 glass glass-accent rounded-xl p-5 hidden z-20 text-slate-200">
    <div class="flex items-start justify-between mb-3">
      <div>
        <div id="info-tag" class="tag-badge inline-block px-2 py-0.5 rounded text-[10px] font-semibold uppercase tracking-wider mb-1">BATTERY</div>
        <h2 id="info-title" class="text-xl font-bold text-white glow-text">电池簇</h2>
      </div>
      <button id="btn-close-info" class="text-slate-400 hover:text-white text-2xl leading-none">×</button>
    </div>
    <p id="info-desc" class="text-sm text-slate-300 leading-relaxed mb-4"></p>
    <div class="grid grid-cols-2 gap-2 text-xs">
      <div class="bg-white/5 rounded-lg p-2.5 border border-white/10"><div class="text-slate-400" id="spec-label-1">额定容量</div><div id="info-spec1" class="text-white font-semibold mt-0.5">-</div></div>
      <div class="bg-white/5 rounded-lg p-2.5 border border-white/10"><div class="text-slate-400" id="spec-label-2">工作电压</div><div id="info-spec2" class="text-white font-semibold mt-0.5">-</div></div>
      <div class="bg-white/5 rounded-lg p-2.5 border border-white/10"><div class="text-slate-400" id="spec-label-3">循环寿命</div><div id="info-spec3" class="text-white font-semibold mt-0.5">-</div></div>
      <div class="bg-white/5 rounded-lg p-2.5 border border-white/10"><div class="text-slate-400" id="spec-label-4">防护等级</div><div id="info-spec4" class="text-white font-semibold mt-0.5">-</div></div>
    </div>
    <div class="mt-3 text-[11px] text-slate-500">提示：点击模型上的门可打开/关闭</div>
  </div>

  <!-- Live Stats HUD -->
  <div class="fixed bottom-24 right-6 w-64 glass rounded-xl p-4 z-20 hidden md:block">
    <div class="flex items-center justify-between mb-3">
      <div class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">实时运行状态</div>
      <div class="flex items-center gap-1.5"><div class="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-dot"></div><span class="text-[10px] text-emerald-400">运行中</span></div>
    </div>
    <div class="space-y-3 text-xs">
      <div><div class="flex justify-between text-slate-300 mb-1"><span>系统 SOC</span><span id="stat-soc" class="text-white font-semibold">78%</span></div><div class="stat-bar-bg"><div id="bar-soc" class="stat-bar-fill bg-emerald-400" style="width:78%"></div></div></div>
      <div><div class="flex justify-between text-slate-300 mb-1"><span>实时功率</span><span id="stat-power" class="text-white font-semibold">420 kW</span></div><div class="stat-bar-bg"><div id="bar-power" class="stat-bar-fill bg-amber-400" style="width:56%"></div></div></div>
      <div><div class="flex justify-between text-slate-300 mb-1"><span>电芯温度</span><span id="stat-temp" class="text-white font-semibold">28.4 ℃</span></div><div class="stat-bar-bg"><div id="bar-temp" class="stat-bar-fill bg-sky-400" style="width:35%"></div></div></div>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="fixed pointer-events-none hidden z-30 px-3 py-2 rounded-lg glass text-xs text-white whitespace-nowrap"></div>

  <!-- Controls -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-20">
    <div class="glass glass-accent rounded-full px-2 py-2 flex items-center gap-1.5">
      <button id="btn-rotate" class="btn-secondary px-4 py-2 rounded-full text-sm font-medium">自动旋转</button>
      <button id="btn-explode" class="btn-secondary px-4 py-2 rounded-full text-sm font-medium">爆炸图</button>
      <button id="btn-section" class="btn-secondary px-4 py-2 rounded-full text-sm font-medium">剖面视图</button>
      <button id="btn-reset" class="btn-tertiary px-4 py-2 rounded-full text-sm font-medium">重置视角</button>
    </div>
  </div>

  <!-- Legend -->
  <div class="fixed bottom-6 left-6 z-20 glass rounded-xl px-4 py-3 text-xs text-slate-300 max-w-xs hidden md:block">
    <div class="flex items-center gap-2 mb-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> 左键拖拽旋转 · 滚轮缩放</div>
    <div class="flex items-center gap-2 mb-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> 点击部件查看详情 · 点击门打开</div>
    <div class="flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> 空格爆炸 · Tab剖面 · R重置</div>
  </div>

  <script>
    window.onerror = function(msg, url, line, col, err) { console.error(msg, url, line, col, err); };
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ===== Materials =====
    const shellMat = new THREE.MeshPhysicalMaterial({ color: 0xe8f0f8, roughness: 0.28, metalness: 0.55, clearcoat: 0.35, clearcoatRoughness: 0.18 });
    const shellCutawayMat = new THREE.MeshPhysicalMaterial({ color: 0xe8f0f8, roughness: 0.28, metalness: 0.55, transparent: true, opacity: 0.08, side: THREE.DoubleSide, depthWrite: false });
    const darkMetalMat = new THREE.MeshStandardMaterial({ color: 0x1f2d3d, roughness: 0.35, metalness: 0.82 });
    const glassMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.05, metalness: 0.1, transmission: 0.35, transparent: true, opacity: 0.25, thickness: 0.8, clearcoat: 1.0, clearcoatRoughness: 0.05 });
    const batteryFrameMat = new THREE.MeshStandardMaterial({ color: 0x0f1a24, roughness: 0.45, metalness: 0.40 });
    const cellMat = new THREE.MeshStandardMaterial({ color: 0x0a151f, roughness: 0.25, metalness: 0.25 });
    const cellEmissiveMat = new THREE.MeshStandardMaterial({ color: 0x00d9a5, roughness: 0.15, metalness: 0.1, emissive: 0x00d9a5, emissiveIntensity: 0.55 });
    const pcsMat = new THREE.MeshPhysicalMaterial({ color: 0x3b82f6, roughness: 0.28, metalness: 0.58, clearcoat: 0.25 });
    const bmsMat = new THREE.MeshPhysicalMaterial({ color: 0xf59e0b, roughness: 0.28, metalness: 0.52, clearcoat: 0.25 });
    const hvacMat = new THREE.MeshPhysicalMaterial({ color: 0x5a6b7d, roughness: 0.32, metalness: 0.62, clearcoat: 0.2 });
    const pipeMat = new THREE.MeshStandardMaterial({ color: 0xe63946, roughness: 0.22, metalness: 0.55 });
    const floorMat = new THREE.MeshPhysicalMaterial({ color: 0x03080d, roughness: 0.12, metalness: 0.55, clearcoat: 0.3 });

    function makePanelCanvas(text) {
      const c = document.createElement('canvas'); c.width = 128; c.height = 64;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#050b14'; ctx.fillRect(0,0,128,64);
      ctx.strokeStyle = '#00d9a5'; ctx.lineWidth = 2; ctx.strokeRect(2,2,124,60);
      ctx.fillStyle = '#00d9a5'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, 64, 32);
      const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex;
    }

    function addLabel(parent, text, x, y, z) {
      const div = document.createElement('div'); div.className = 'label-card'; div.textContent = text;
      const obj = new CSS2DObject(div); obj.position.set(x,y,z); parent.add(obj); return obj;
    }

    // ===== Scene =====
    const container = document.getElementById('canvas-container');
    const css2dContainer = document.getElementById('css2d-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02060a);
    scene.fog = new THREE.FogExp2(0x02060a, 0.014);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(3, 2.5, 5.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.05;
    container.appendChild(renderer.domElement);

    const cssRenderer = new CSS2DRenderer({ element: css2dContainer });
    cssRenderer.setSize(window.innerWidth, window.innerHeight);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.42, 0.22, 0.88);
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.07;
    controls.maxPolarAngle = Math.PI / 2 - 0.02; controls.minDistance = 2; controls.maxDistance = 55;

    const pmremGenerator = new THREE.PMREMGenerator(renderer); pmremGenerator.compileEquirectangularShader();
    new RGBELoader().load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/autoshop_01_1k.hdr', (texture) => {
      scene.environment = pmremGenerator.fromEquirectangular(texture).texture; texture.dispose();
      document.getElementById('loading').classList.add('hidden-fade'); setTimeout(() => document.getElementById('loading').remove(), 600);
    }, undefined, () => {
      scene.environment = pmremGenerator.fromScene(new RoomEnvironment()).texture;
      document.getElementById('loading').classList.add('hidden-fade'); setTimeout(() => document.getElementById('loading').remove(), 600);
    });

    // Lights
    const hemi = new THREE.HemisphereLight(0xffffff, 0x0a1a2a, 0.35); scene.add(hemi);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8); dirLight.position.set(8, 18, 10); dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048,2048); dirLight.shadow.bias = -0.0004; dirLight.shadow.radius = 2; scene.add(dirLight);
    const fill = new THREE.DirectionalLight(0x00d9a5, 0.35); fill.position.set(-10, 5, -8); scene.add(fill);
    const rim = new THREE.SpotLight(0x00aaff, 1.2); rim.position.set(0, 16, -14); rim.lookAt(0,0,0); rim.angle = Math.PI/5; rim.penumbra = 0.6; scene.add(rim);

    // Floor
    const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(100,100), floorMat);
    floorMesh.rotation.x = -Math.PI / 2; floorMesh.position.y = -0.02; floorMesh.receiveShadow = true; scene.add(floorMesh);
    const grid = new THREE.GridHelper(100,100, 0x132233, 0x0a151f); grid.position.y = -0.015; scene.add(grid);

    // ===== Product builders =====
    const products = {};
    let currentKey = 'stacked';

    // ---------- Stacked All-in-One ----------
    function buildStacked() {
      const g = new THREE.Group();
      const parts = [];
      const shellW = 0.95, shellH = 2.15, shellD = 0.82;

      // Shell group
      const shell = new THREE.Group();
      const sm = shellMat.clone();
      const back = new THREE.Mesh(new THREE.BoxGeometry(shellW, shellH, 0.04), sm); back.position.set(0, shellH/2, -shellD/2); back.castShadow = true; back.receiveShadow = true; shell.add(back);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.04, shellH, shellD), sm); left.position.set(-shellW/2, shellH/2, 0); left.castShadow = true; left.receiveShadow = true; shell.add(left);
      const right = new THREE.Mesh(new THREE.BoxGeometry(0.04, shellH, shellD), sm); right.position.set(shellW/2, shellH/2, 0); right.castShadow = true; right.receiveShadow = true; shell.add(right);
      const top = new THREE.Mesh(new THREE.BoxGeometry(shellW, 0.04, shellD), sm); top.position.set(0, shellH, 0); top.castShadow = true; top.receiveShadow = true; shell.add(top);
      const bottom = new THREE.Mesh(new THREE.BoxGeometry(shellW, 0.04, shellD), sm); bottom.position.set(0, 0, 0); bottom.castShadow = true; bottom.receiveShadow = true; shell.add(bottom);
      shell.userData = { part: 'shell', name: '堆叠一体机壳体', tag: 'SHELL', desc: '立式一体化储能柜，冷轧钢板+喷涂，前玻璃门设计，防护等级 IP55。', specs: ['215 kWh', 'IP55', '户外型', '立式'] };
      g.add(shell); parts.push(shell);

      // Glass doors (hinged)
      const doorL = new THREE.Group(); doorL.position.set(0, shellH/2, shellD/2);
      const dLFrame = new THREE.Mesh(new THREE.BoxGeometry(shellW/2-0.01, shellH-0.06, 0.025), darkMetalMat); dLFrame.position.set(-shellW/4, 0, 0); dLFrame.castShadow = true; doorL.add(dLFrame);
      const dLGlass = new THREE.Mesh(new THREE.BoxGeometry(shellW/2-0.06, shellH-0.12, 0.01), glassMat); dLGlass.position.set(-shellW/4, 0, 0.01); doorL.add(dLGlass);
      doorL.userData = { part: 'doorL', name: '左玻璃门', tag: 'DOOR', isDoor: true, hingeSide: 'left' };
      g.add(doorL); parts.push(doorL);

      const doorR = new THREE.Group(); doorR.position.set(0, shellH/2, shellD/2);
      const dRFrame = new THREE.Mesh(new THREE.BoxGeometry(shellW/2-0.01, shellH-0.06, 0.025), darkMetalMat); dRFrame.position.set(shellW/4, 0, 0); dRFrame.castShadow = true; doorR.add(dRFrame);
      const dRGlass = new THREE.Mesh(new THREE.BoxGeometry(shellW/2-0.06, shellH-0.12, 0.01), glassMat); dRGlass.position.set(shellW/4, 0, 0.01); doorR.add(dRGlass);
      doorR.userData = { part: 'doorR', name: '右玻璃门', tag: 'DOOR', isDoor: true, hingeSide: 'right' };
      g.add(doorR); parts.push(doorR);

      // Stacks
      const stacks = [];
      for (let i=0;i<5;i++) {
        const stack = new THREE.Group(); stack.position.set(0, 0.22 + i*0.38, 0);
        const mod = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.32, 0.68), cellMat.clone()); mod.castShadow = true; mod.receiveShadow = true; stack.add(mod);
        // Bumper + handle
        const handle = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.02, 0.02), darkMetalMat); handle.position.set(0, 0, 0.36); stack.add(handle);

    function createProduct(key, builder) {
      const data = builder();
      const group = data.group;
      group.visible = false;
      scene.add(group);
      const originalPos = new Map();
      data.parts.forEach(p => originalPos.set(p.uuid, p.position.clone()));
      const doorOpen = new Map();
      (data.doors || []).forEach(d => doorOpen.set(d.uuid, false));
      products[key] = { group, parts: data.parts, originalPos, animatables: data.animatables || {}, labels: data.labels || {}, doors: data.doors || [], doorOpen };
    }

    let autoRotate = true, exploded = false, sectionMode = false, tourMode = false; let tourIndex = 0;
    const urlParams = new URLSearchParams(window.location.search);
    const initialProduct = ['stacked','cabinet','container'].includes(urlParams.get('product')) ? urlParams.get('product') : 'stacked';

    function switchProduct(key) {
      if (currentKey === key) return;
      products[currentKey].group.visible = false;
      autoRotate = true; exploded = false; sectionMode = false; tourMode = false; tourIndex = 0;
      updateBtnText(); document.getElementById('info-panel').classList.add('hidden');
      currentKey = key;
      Object.keys(products).forEach(k => products[k].group.visible = (k===key));
      const camMap = { stacked: {pos:[3.5,2.8,6], target:[0,1.1,0]}, cabinet: {pos:[4.2,3.2,7], target:[0,1.0,0]}, container: {pos:[15,9,18], target:[0,0,0]} };
      const cfg = camMap[key];
      gsapTo(camera.position, {x:cfg.pos[0], y:cfg.pos[1], z:cfg.pos[2]}, 0.8);
      gsapTo(controls.target, {x:cfg.target[0], y:cfg.target[1], z:cfg.target[2]}, 0.8);
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.key === key));
      buildNav();
      resetPositions();
      applySectionMode();
    }

    // ===== Interactions =====
    const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2(); let hoveredObj = null;
    function findPartGroup(mesh) { let curr = mesh; while (curr) { if (curr.userData && curr.userData.part) return curr; curr = curr.parent; } return null; }
    function setEmissive(obj, value) { obj.traverse(child => { if (child.isMesh && child.material && child.material.emissive && !child.userData.isLed) { child.userData._origEmissive = child.userData._origEmissive || child.material.emissive.getHex(); child.material.emissive.setHex(value ? 0x00d9a5 : child.userData._origEmissive); child.material.emissiveIntensity = value ? 0.5 : 0; } }); }
    function onPointerMove(e) {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(products[currentKey].group.children, true);
      if (intersects.length > 0) {
        const group = findPartGroup(intersects[0].object);
        if (group && group !== hoveredObj) { if (hoveredObj) setEmissive(hoveredObj, false); hoveredObj = group; setEmissive(hoveredObj, true); document.body.style.cursor = group.userData.isDoor ? 'pointer' : 'pointer'; showTooltip(group.userData.name || '部件', e.clientX, e.clientY); }
      } else { if (hoveredObj) { setEmissive(hoveredObj, false); hoveredObj = null; document.body.style.cursor = 'default'; hideTooltip(); } }
    }
    function onClick(e) {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(products[currentKey].group.children, true);
      if (intersects.length > 0) {
        const group = findPartGroup(intersects[0].object);
        if (!group) return;
        if (group.userData.isDoor) { toggleDoor(group); }
        else { focusPart(group); }
      }
    }
    window.addEventListener('mousemove', onPointerMove); window.addEventListener('click', onClick);

    const tooltip = document.getElementById('tooltip');
    function showTooltip(text, x, y) { tooltip.textContent = text; tooltip.classList.remove('hidden'); tooltip.style.left = (x + 12) + 'px'; tooltip.style.top = (y + 12) + 'px'; }
    function hideTooltip() { tooltip.classList.add('hidden'); }

    function toggleDoor(doorGroup) {
      const prod = products[currentKey];
      const isOpen = prod.doorOpen.get(doorGroup.uuid);
      prod.doorOpen.set(doorGroup.uuid, !isOpen);
      const targetAngle = isOpen ? 0 : (doorGroup.userData.hingeSide === 'left' ? -Math.PI / 1.6 : Math.PI / 1.6);
      gsapTo(doorGroup.rotation, { y: targetAngle }, 0.6);
    }

    function showInfo(group) { const data = group.userData; if (!data || !data.part) return; document.getElementById('info-tag').textContent = data.tag || 'COMPONENT'; document.getElementById('info-title').textContent = data.name || '部件'; document.getElementById('info-desc').textContent = data.desc || ''; [1,2,3,4].forEach(i => document.getElementById('info-spec'+i).textContent = (data.specs && data.specs[i-1]) || '-'); const panel = document.getElementById('info-panel'); panel.classList.remove('hidden'); panel.classList.add('info-enter'); highlightNav(data.part); }
    document.getElementById('btn-close-info').addEventListener('click', () => document.getElementById('info-panel').classList.add('hidden'));

    function focusPart(group) { autoRotate = false; tourMode = false; updateBtnText(); const box = new THREE.Box3().setFromObject(group); const center = box.getCenter(new THREE.Vector3()); const size = box.getSize(new THREE.Vector3()); const maxDim = Math.max(size.x, size.y, size.z); const dist = Math.max(maxDim * 1.9, 3.8); const offset = camera.position.clone().sub(controls.target).normalize().multiplyScalar(dist); const endPos = center.clone().add(offset); gsapTo(camera.position, {x:endPos.x, y:endPos.y, z:endPos.z}, 0.9); gsapTo(controls.target, {x:center.x, y:center.y, z:center.z}, 0.9); showInfo(group); }

    const navContainer = document.getElementById('part-nav'); const navMap = new Map();
    function buildNav() { navContainer.innerHTML = ''; navMap.clear(); const seen = new Set(); products[currentKey].parts.forEach((p, idx) => { const key = p.userData.part; if (!key || seen.has(key)) return; seen.add(key); const el = document.createElement('div'); el.className = 'nav-item px-3 py-2 rounded cursor-pointer text-sm text-slate-300 flex items-center justify-between'; el.innerHTML = `<span>${p.userData.name}</span><span class="text-xs text-slate-500">${idx+1}</span>`; el.addEventListener('click', () => focusPart(p)); navContainer.appendChild(el); navMap.set(key, el); }); }
    function highlightNav(part) { navMap.forEach((el, key) => el.classList.toggle('active', key === part)); }

    function updateBtnText() { document.getElementById('btn-rotate').textContent = autoRotate ? '停止旋转' : '自动旋转'; document.getElementById('btn-explode').textContent = exploded ? '合拢视图' : '爆炸图'; document.getElementById('btn-section').textContent = sectionMode ? '关闭剖面' : '剖面视图'; document.getElementById('btn-tour').innerHTML = tourMode ? '<span class="w-2 h-2 rounded-full bg-black/60 pulse-dot"></span> 停止导览' : '<span class="w-2 h-2 rounded-full bg-black/60 pulse-dot"></span> 开启自动导览'; }
    document.getElementById('btn-rotate').addEventListener('click', () => { autoRotate = !autoRotate; if (tourMode) tourMode = false; updateBtnText(); });
    document.getElementById('btn-explode').addEventListener('click', toggleExplode);
    document.getElementById('btn-section').addEventListener('click', () => { sectionMode = !sectionMode; updateBtnText(); applySectionMode(); });
    document.getElementById('btn-reset').addEventListener('click', resetView);
    document.getElementById('btn-tour').addEventListener('click', () => { tourMode = !tourMode; if (tourMode) { autoRotate = false; exploded = false; updateBtnText(); resetPositions(); applySectionMode(); closeDoors(); tourIndex = 0; tourNext(); } else { updateBtnText(); } });
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchProduct(btn.dataset.key)));

    function closeDoors() { const prod = products[currentKey]; prod.doors.forEach(d => { if (prod.doorOpen.get(d.uuid)) { prod.doorOpen.set(d.uuid, false); gsapTo(d.rotation, { y: 0 }, 0.5); } }); }
    function resetPositions() { products[currentKey].parts.forEach(p => { const orig = products[currentKey].originalPos.get(p.uuid); if (orig) p.position.copy(orig); }); }
    function applySectionMode() {
      products[currentKey].parts.forEach(p => {
        if (p.userData.part === 'shell') {
          p.traverse(child => {
            if (child.isMesh && child.geometry.type === 'BoxGeometry') {
              const isWall = child.scale.x <= 1.1 && child.scale.y <= 1.1; // crude heuristic
              child.material = sectionMode ? shellCutawayMat.clone() : shellMat.clone();
              if (sectionMode) { child.material.transparent = true; child.material.opacity = 0.08; child.material.side = THREE.DoubleSide; child.material.depthWrite = false; }
            }
          });
        }
      });
    }

    function toggleExplode() {
      exploded = !exploded; updateBtnText(); closeDoors();
      const prod = products[currentKey];
      if (currentKey === 'stacked') {
        if (exploded) {
          prod.parts.filter(p => p.userData.part && p.userData.part.startsWith('stack')).forEach((p, i) => { const orig = prod.originalPos.get(p.uuid); gsapTo(p.position, { x: orig.x, y: orig.y + 0.12 + i*0.22, z: orig.z + 0.18 }, 0.8); });
          const topUnit = prod.parts.find(p => p.userData.part === 'pcs'); if (topUnit) { const orig = prod.originalPos.get(topUnit.uuid); gsapTo(topUnit.position, { x: orig.x, y: orig.y + 0.55, z: orig.z + 0.18 }, 0.8); }
          const hvac = prod.parts.find(p => p.userData.part === 'hvac'); if (hvac) { const orig = prod.originalPos.get(hvac.uuid); gsapTo(hvac.position, { x: orig.x, y: orig.y - 0.25, z: orig.z + 0.18 }, 0.8); }
          const shell = prod.parts.find(p => p.userData.part === 'shell'); if (shell) { const orig = prod.originalPos.get(shell.uuid); gsapTo(shell.position, { x: orig.x, y: orig.y, z: orig.z - 0.55 }, 0.8); }
          prod.doors.forEach(d => { const orig = prod.originalPos.get(d.uuid); gsapTo(d.position, { x: orig.x, y: orig.y, z: orig.z - 0.55 }, 0.8); });
        } else { resetPositions(); }
      } else if (currentKey === 'cabinet') {
        if (exploded) {
          const racks = prod.parts.filter(p => p.userData.part && p.userData.part.startsWith('rack'));
          racks.forEach((p, i) => { const orig = prod.originalPos.get(p.uuid); gsapTo(p.position, { x: orig.x + (i===0 ? -0.55 : 0.55), y: orig.y, z: orig.z + 0.25 }, 0.8); });
          const pcs = prod.parts.find(p => p.userData.part === 'pcs'); if (pcs) { const orig = prod.originalPos.get(pcs.uuid); gsapTo(pcs.position, { x: orig.x + 0.35, y: orig.y, z: orig.z + 0.25 }, 0.8); }
          const bms = prod.parts.find(p => p.userData.part === 'bms'); if (bms) { const orig = prod.originalPos.get(bms.uuid); gsapTo(bms.position, { x: orig.x + 0.35, y: orig.y, z: orig.z + 0.25 }, 0.8); }
          const hvac = prod.parts.find(p => p.userData.part === 'hvac'); if (hvac) { const orig = prod.originalPos.get(hvac.uuid); gsapTo(hvac.position, { x: orig.x - 0.35, y: orig.y, z: orig.z + 0.25 }, 0.8); }
          const fire = prod.parts.find(p => p.userData.part === 'fire'); if (fire) { const orig = prod.originalPos.get(fire.uuid); gsapTo(fire.position, { x: orig.x, y: orig.y + 0.25, z: orig.z + 0.15 }, 0.8); }
          const shell = prod.parts.find(p => p.userData.part === 'shell'); if (shell) { const orig = prod.originalPos.get(shell.uuid); gsapTo(shell.position, { x: orig.x, y: orig.y, z: orig.z - 0.55 }, 0.8); }
          prod.doors.forEach(d => { const orig = prod.originalPos.get(d.uuid); gsapTo(d.position, { x: orig.x, y: orig.y, z: orig.z - 0.55 }, 0.8); });
        } else { resetPositions(); }
      } else if (currentKey === 'container') {
        if (exploded) {
          const racks = prod.parts.filter(p => p.userData.part === 'battery');
          racks.forEach((p, i) => { const orig = prod.originalPos.get(p.uuid); const dir = (i < 2) ? -1 : 1; const offset = (i % 2 === 0) ? 1.8 : 0.8; gsapTo(p.position, { x: orig.x + dir * offset, y: orig.y + 0.42, z: orig.z + 0.42 }, 0.8); });
          const pcs = prod.parts.find(p => p.userData.part === 'pcs'); if (pcs) { const orig = prod.originalPos.get(pcs.uuid); gsapTo(pcs.position, { x: orig.x + 1.9, y: orig.y, z: orig.z + 0.85 }, 0.8); }
          const bms = prod.parts.find(p => p.userData.part === 'bms'); if (bms) { const orig = prod.originalPos.get(bms.uuid); gsapTo(bms.position, { x: orig.x + 2.8, y: orig.y, z: orig.z + 0.75 }, 0.8); }
          const hvac = prod.parts.find(p => p.userData.part === 'hvac'); if (hvac) { const orig = prod.originalPos.get(hvac.uuid); gsapTo(hvac.position, { x: orig.x - 1.9, y: orig.y, z: orig.z + 0.75 }, 0.8); }
        } else { resetPositions(); }
      }
    }

    function resetView() { autoRotate = false; exploded = false; sectionMode = false; tourMode = false; closeDoors(); applySectionMode(); updateBtnText(); resetPositions(); const cfg = { stacked: {pos:[3.5,2.8,6], target:[0,1.1,0]}, cabinet: {pos:[4.2,3.2,7], target:[0,1.0,0]}, container: {pos:[15,9,18], target:[0,0,0]} }[currentKey]; gsapTo(camera.position, {x:cfg.pos[0], y:cfg.pos[1], z:cfg.pos[2]}, 0.8); gsapTo(controls.target, {x:cfg.target[0], y:cfg.target[1], z:cfg.target[2]}, 0.8); document.getElementById('info-panel').classList.add('hidden'); highlightNav(null); }

    let tourTimer = null;
    function tourNext() { if (!tourMode) return; const parts = products[currentKey].parts; const order = parts.map(p => p.userData.part).filter((v,i,a) => v && a.indexOf(v)===i); const key = order[tourIndex % order.length]; const target = parts.find(p => p.userData.part === key); if (target) { if ((currentKey === 'stacked' || currentKey === 'cabinet') && !exploded) { toggleExplode(); } focusPart(target); } tourIndex++; tourTimer = setTimeout(tourNext, 4500); }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); toggleExplode(); } if (e.key === 'r' || e.key === 'R') resetView(); if (e.key === 'Tab') { e.preventDefault(); document.getElementById('btn-section').click(); } if (e.key >= '1' && e.key <= '6') { const idx = parseInt(e.key)-1; const el = navContainer.children[idx]; if (el) el.click(); } });

    const tweens = [];
    function gsapTo(target, endProps, durationSeconds) { const startProps = {}; for (const k in endProps) startProps[k] = target[k]; tweens.push({ target, startProps, endProps, duration: durationSeconds, elapsed: 0 }); }

    let statT = 0;
    function updateStats(dt) {
      statT += dt;
      const soc = 55 + 35 * Math.sin(statT * 0.3);
      const power = 200 + 350 * Math.abs(Math.sin(statT * 0.5 + 1));
      const temp = 24 + 6 * Math.sin(statT * 0.2 + 2);
      document.getElementById('stat-soc').textContent = soc.toFixed(1) + '%'; document.getElementById('bar-soc').style.width = Math.max(0, Math.min(100, soc)) + '%';
      document.getElementById('stat-power').textContent = power.toFixed(0) + ' kW'; document.getElementById('bar-power').style.width = Math.max(0, Math.min(100, power / 630 * 100)) + '%';
      document.getElementById('stat-temp').textContent = temp.toFixed(1) + ' ℃'; document.getElementById('bar-temp').style.width = Math.max(0, Math.min(100, (temp - 15) / 25 * 100)) + '%';
    }

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta(); const time = clock.getElapsedTime();
      const prod = products[currentKey];
      if (autoRotate) prod.group.rotation.y += dt * 0.10;
      if (prod.animatables.fan) prod.animatables.fan.rotation.z += dt * 8;
      prod.group.traverse(child => { if (child.userData && child.userData.isLed && child.material && child.material.emissive) { const base = child.userData.baseIntensity || 0.4; const phase = child.userData.phase || 0; child.material.emissiveIntensity = base + 0.15 * Math.sin(time * 3 + phase); } });
      for (let i = tweens.length - 1; i >= 0; i--) { const t = tweens[i]; t.elapsed += dt; const p = Math.min(t.elapsed / t.duration, 1); const ease = 1 - Math.pow(1 - p, 3); for (const k in t.endProps) t.target[k] = t.startProps[k] + (t.endProps[k] - t.startProps[k]) * ease; if (p >= 1) tweens.splice(i, 1); }
      updateStats(dt); controls.update(); composer.render(); cssRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); cssRenderer.setSize(window.innerWidth, window.innerHeight); });

    switchProduct(initialProduct);
  </script>
</body>
</html>
