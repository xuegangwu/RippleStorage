<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RippleStorage 3D - 工商业储能产品系列</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #02060a; font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
    #css2d-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; pointer-events: none; }
    .glass {
      background: rgba(8, 20, 34, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 217, 165, 0.12);
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .glow-text { text-shadow: 0 0 14px rgba(0, 217, 165, 0.55); }
    .btn-primary {
      background: linear-gradient(135deg, #00d9a5 0%, #00a37a 100%);
      color: #02080f; font-weight: 700; transition: all .2s ease;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 217, 165, 0.4); }
    .btn-secondary {
      background: rgba(255,255,255,0.05);
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.10);
      transition: all .2s ease;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.10); border-color: rgba(0,217,165,0.45); }
    .tag-badge {
      background: rgba(0, 217, 165, 0.12);
      color: #00d9a5;
      border: 1px solid rgba(0, 217, 165, 0.25);
    }
    .nav-item { transition: all .15s ease; border-left: 2px solid transparent; }
    .nav-item:hover { background: rgba(0,217,165,0.08); border-left-color: rgba(0,217,165,0.6); }
    .nav-item.active { background: rgba(0,217,165,0.15); border-left-color: #00d9a5; }
    .info-enter { animation: slideIn .35s ease both; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,217,165,0.5); } 70% { box-shadow: 0 0 0 6px rgba(0,217,165,0); } 100% { box-shadow: 0 0 0 0 rgba(0,217,165,0); } }
    .stat-bar-bg { background: rgba(255,255,255,0.08); border-radius: 999px; height: 6px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 999px; transition: width .6s ease; }
    .label-card {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(0,217,165,0.35);
      border-radius: 6px;
      padding: 4px 8px;
      color: #00d9a5;
      font-size: 11px;
      font-weight: 600;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
    .tab-btn { transition: all .15s ease; }
    .tab-btn.active { background: rgba(0,217,165,0.15); border-color: rgba(0,217,165,0.6); color: #00d9a5; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="css2d-container"></div>

  <!-- Header -->
  <div class="fixed top-0 left-0 right-0 z-20 flex items-center justify-between px-6 py-4 pointer-events-none">
    <div class="flex items-center gap-4 pointer-events-auto">
      <a href="/" class="flex items-center gap-2 text-slate-300 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        <span class="text-sm font-medium hidden sm:inline">返回首页</span>
      </a>
      <div class="w-px h-5 bg-white/10 hidden sm:block"></div>
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-md bg-gradient-to-br from-emerald-400 to-teal-600 flex items-center justify-center text-white font-bold">R</div>
        <div>
          <h1 class="text-white text-lg font-semibold tracking-wide">RippleStorage <span class="text-emerald-400">3D</span></h1>
          <p class="text-slate-400 text-xs">工商业储能产品系列可视化</p>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-3 pointer-events-auto">
      <div class="hidden md:flex items-center gap-2 text-xs text-slate-300 mr-2">
        <span class="px-2 py-1 rounded bg-white/5 border border-white/10">堆叠一体机</span>
        <span class="px-2 py-1 rounded bg-white/5 border border-white/10">户外柜一体机</span>
        <span class="px-2 py-1 rounded bg-white/5 border border-white/10">集装箱式储能</span>
      </div>
      <a href="/" class="btn-primary px-4 py-2 rounded-lg text-sm hidden sm:inline-flex items-center gap-2">
        <span>开始推演</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
    </div>
  </div>

  <!-- Product Switcher Tabs -->
  <div class="fixed top-20 left-1/2 -translate-x-1/2 z-20 hidden md:block">
    <div class="glass rounded-full px-2 py-1.5 flex items-center gap-1">
      <button class="tab-btn active px-4 py-1.5 rounded-full text-sm text-slate-300 border border-transparent" data-key="stacked">工商业堆叠一体机</button>
      <button class="tab-btn px-4 py-1.5 rounded-full text-sm text-slate-300 border border-transparent" data-key="cabinet">工商业一体机</button>
      <button class="tab-btn px-4 py-1.5 rounded-full text-sm text-slate-300 border border-transparent" data-key="container">大型储能集装箱</button>
    </div>
  </div>

  <!-- Left Navigation Tree -->
  <div class="fixed top-20 left-6 bottom-24 w-56 glass rounded-xl p-3 z-20 flex flex-col hidden md:flex">
    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 px-2">部件导航</div>
    <div class="flex-1 overflow-y-auto space-y-1" id="part-nav"></div>
    <div class="mt-2 pt-2 border-t border-white/10 px-2">
      <button id="btn-tour" class="btn-primary w-full px-3 py-2 rounded-lg text-xs flex items-center justify-center gap-2">
        <span class="w-2 h-2 rounded-full bg-black/60 pulse-dot"></span>
        开启自动导览
      </button>
    </div>
  </div>

  <!-- Part Info Panel -->
  <div id="info-panel" class="fixed top-20 right-6 w-80 glass rounded-xl p-5 hidden z-20 text-slate-200">
    <div class="flex items-start justify-between mb-3">
      <div>
        <div id="info-tag" class="tag-badge inline-block px-2 py-0.5 rounded text-[10px] font-semibold uppercase tracking-wider mb-1">BATTERY</div>
        <h2 id="info-title" class="text-xl font-bold text-white glow-text">电池簇</h2>
      </div>
      <button id="btn-close-info" class="text-slate-400 hover:text-white text-xl leading-none">×</button>
    </div>
    <p id="info-desc" class="text-sm text-slate-300 leading-relaxed mb-4"></p>
    <div class="grid grid-cols-2 gap-2 text-xs">
      <div class="bg-white/5 rounded-lg p-2 border border-white/10"><div class="text-slate-400" id="spec-label-1">额定容量</div><div id="info-spec1" class="text-white font-semibold mt-0.5">-</div></div>
      <div class="bg-white/5 rounded-lg p-2 border border-white/10"><div class="text-slate-400" id="spec-label-2">工作电压</div><div id="info-spec2" class="text-white font-semibold mt-0.5">-</div></div>
      <div class="bg-white/5 rounded-lg p-2 border border-white/10"><div class="text-slate-400" id="spec-label-3">循环寿命</div><div id="info-spec3" class="text-white font-semibold mt-0.5">-</div></div>
      <div class="bg-white/5 rounded-lg p-2 border border-white/10"><div class="text-slate-400" id="spec-label-4">防护等级</div><div id="info-spec4" class="text-white font-semibold mt-0.5">-</div></div>
    </div>
  </div>

  <!-- Live Stats HUD -->
  <div class="fixed bottom-24 right-6 w-64 glass rounded-xl p-4 z-20 hidden md:block">
    <div class="flex items-center justify-between mb-3">
      <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider">实时运行状态</div>
      <div class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></div>
    </div>
    <div class="space-y-3 text-xs">
      <div><div class="flex justify-between text-slate-300 mb-1"><span>系统 SOC</span><span id="stat-soc" class="text-white font-semibold">78%</span></div><div class="stat-bar-bg"><div id="bar-soc" class="stat-bar-fill bg-emerald-400" style="width:78%"></div></div></div>
      <div><div class="flex justify-between text-slate-300 mb-1"><span>实时功率</span><span id="stat-power" class="text-white font-semibold">420 kW</span></div><div class="stat-bar-bg"><div id="bar-power" class="stat-bar-fill bg-amber-400" style="width:56%"></div></div></div>
      <div><div class="flex justify-between text-slate-300 mb-1"><span>电芯温度</span><span id="stat-temp" class="text-white font-semibold">28.4 ℃</span></div><div class="stat-bar-bg"><div id="bar-temp" class="stat-bar-fill bg-sky-400" style="width:35%"></div></div></div>
    </div>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="fixed pointer-events-none hidden z-30 px-3 py-2 rounded-lg glass text-xs text-white whitespace-nowrap"></div>

  <!-- Controls -->
  <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-20">
    <div class="glass rounded-full px-3 py-2 flex items-center gap-2">
      <button id="btn-rotate" class="btn-primary px-4 py-2 rounded-full text-sm">自动旋转</button>
      <button id="btn-explode" class="btn-secondary px-4 py-2 rounded-full text-sm">爆炸图</button>
      <button id="btn-section" class="btn-secondary px-4 py-2 rounded-full text-sm">剖面视图</button>
      <button id="btn-reset" class="btn-secondary px-4 py-2 rounded-full text-sm">重置视角</button>
    </div>
  </div>

  <!-- Legend -->
  <div class="fixed bottom-6 left-6 z-20 glass rounded-xl px-4 py-3 text-xs text-slate-300 max-w-xs hidden md:block">
    <div class="flex items-center gap-2 mb-1"><span class="w-2 h-2 rounded-full bg-emerald-400"></span> 鼠标左键拖拽旋转 · 滚轮缩放</div>
    <div class="flex items-center gap-2 mb-1"><span class="w-2 h-2 rounded-full bg-emerald-400"></span> 点击部件查看详情 / 左侧导航聚焦</div>
    <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-emerald-400"></span> 快捷键: 空格爆炸 · Tab剖面 · R重置 · 1~6聚焦</div>
  </div>

  <script>
    window.onerror = function(msg, url, line, col, err) { console.error(msg, url, line, col, err); };
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
    import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

    // ===== Shared materials =====
    const shellMat = new THREE.MeshPhysicalMaterial({ color: 0xddeeff, roughness: 0.35, metalness: 0.65, clearcoat: 0.3, clearcoatRoughness: 0.2 });
    const shellCutawayMat = new THREE.MeshPhysicalMaterial({ color: 0xddeeff, roughness: 0.35, metalness: 0.65, transparent: true, opacity: 0.10, side: THREE.DoubleSide, depthWrite: false });
    const darkMetalMat = new THREE.MeshStandardMaterial({ color: 0x263748, roughness: 0.40, metalness: 0.80 });
    const batteryFrameMat = new THREE.MeshStandardMaterial({ color: 0x111b26, roughness: 0.5, metalness: 0.35 });
    const cellMat = new THREE.MeshStandardMaterial({ color: 0x0b1c2e, roughness: 0.3, metalness: 0.20 });
    const cellEmissiveMat = new THREE.MeshStandardMaterial({ color: 0x00d9a5, roughness: 0.2, metalness: 0.1, emissive: 0x00d9a5, emissiveIntensity: 0.45 });
    const pcsMat = new THREE.MeshPhysicalMaterial({ color: 0x3b82f6, roughness: 0.30, metalness: 0.55, clearcoat: 0.2 });
    const bmsMat = new THREE.MeshPhysicalMaterial({ color: 0xf59e0b, roughness: 0.30, metalness: 0.50, clearcoat: 0.2 });
    const hvacMat = new THREE.MeshPhysicalMaterial({ color: 0x64748b, roughness: 0.35, metalness: 0.60, clearcoat: 0.15 });
    const pipeMat = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.25, metalness: 0.50 });
    const cableMat = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.4, metalness: 0.2 });
    const commCableMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.4, metalness: 0.2 });
    const floorMat = new THREE.MeshPhysicalMaterial({ color: 0x040a10, roughness: 0.15, metalness: 0.45, clearcoat: 0.25 });

    function makePanelCanvas(text) {
      const c = document.createElement('canvas'); c.width = 128; c.height = 64;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#0a151f'; ctx.fillRect(0,0,128,64);
      ctx.strokeStyle = '#00d9a5'; ctx.lineWidth = 2; ctx.strokeRect(2,2,124,60);
      ctx.fillStyle = '#00d9a5'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, 64, 32);
      const tex = new THREE.CanvasTexture(c); tex.colorSpace = THREE.SRGBColorSpace; return tex;
    }

    function addLabel(parent, text, x, y, z) {
      const div = document.createElement('div'); div.className = 'label-card'; div.textContent = text;
      const obj = new CSS2DObject(div); obj.position.set(x,y,z); parent.add(obj); return obj;
    }

    // ===== Scene setup =====
    const container = document.getElementById('canvas-container');
    const css2dContainer = document.getElementById('css2d-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02060a);
    scene.fog = new THREE.FogExp2(0x02060a, 0.012);

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(12, 8, 16);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping; renderer.toneMappingExposure = 1.0;
    container.appendChild(renderer.domElement);

    const cssRenderer = new CSS2DRenderer({ element: css2dContainer });
    cssRenderer.setSize(window.innerWidth, window.innerHeight);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.45, 0.25, 0.85);
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.06;
    controls.maxPolarAngle = Math.PI / 2 - 0.02; controls.minDistance = 4; controls.maxDistance = 55;

    const pmremGenerator = new THREE.PMREMGenerator(renderer); pmremGenerator.compileEquirectangularShader();
    new RGBELoader().load('https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/autoshop_01_1k.hdr', (texture) => {
      scene.environment = pmremGenerator.fromEquirectangular(texture).texture; texture.dispose();
    }, undefined, () => { scene.environment = pmremGenerator.fromScene(new RoomEnvironment()).texture; });

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.15); scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0); dirLight.position.set(10, 20, 10); dirLight.castShadow = true; dirLight.shadow.mapSize.set(2048,2048); dirLight.shadow.bias = -0.0005; scene.add(dirLight);
    const fillLight = new THREE.DirectionalLight(0x00d9a5, 0.45); fillLight.position.set(-12, 6, -10); scene.add(fillLight);
    const spot = new THREE.SpotLight(0x00aaff, 1.5); spot.position.set(0, 18, -18); spot.lookAt(0,0,0); spot.angle = Math.PI / 6; spot.penumbra = 0.5; scene.add(spot);

    // Floor
    const floorMesh = new THREE.Mesh(new THREE.PlaneGeometry(80,80), floorMat);
    floorMesh.rotation.x = -Math.PI / 2; floorMesh.position.y = -0.05; floorMesh.receiveShadow = true; scene.add(floorMesh);
    const grid = new THREE.GridHelper(80,80, 0x112233, 0x0a151f); grid.position.y = -0.04; scene.add(grid);

    // ===== Product builders =====
    const products = {}; // key -> { group, parts, particles, labels, originalPos, animatables }
    let currentKey = 'stacked';

    // ---------- Stacked All-in-One ----------
    function buildStacked() {
      const g = new THREE.Group();
      const parts = [];

      // Enclosure
      const shellW = 1.0, shellH = 2.2, shellD = 0.85;
      const shell = new THREE.Group();
      const boxMat = shellMat.clone();
      const back = new THREE.Mesh(new THREE.BoxGeometry(shellW, shellH, 0.04), boxMat); back.position.set(0, shellH/2, -shellD/2); back.castShadow = true; shell.add(back);
      const left = new THREE.Mesh(new THREE.BoxGeometry(0.04, shellH, shellD), boxMat); left.position.set(-shellW/2, shellH/2, 0); left.castShadow = true; shell.add(left);
      const right = new THREE.Mesh(new THREE.BoxGeometry(0.04, shellH, shellD), boxMat); right.position.set(shellW/2, shellH/2, 0); right.castShadow = true; shell.add(right);
      const top = new THREE.Mesh(new THREE.BoxGeometry(shellW, 0.04, shellD), boxMat); top.position.set(0, shellH, 0); top.castShadow = true; shell.add(top);
      const bottom = new THREE.Mesh(new THREE.BoxGeometry(shellW, 0.04, shellD), boxMat); bottom.position.set(0, 0, 0); bottom.castShadow = true; shell.add(bottom);
      const door = new THREE.Mesh(new THREE.BoxGeometry(0.04, shellH-0.08, shellD-0.04), boxMat); door.position.set(0, shellH/2, shellD/2); door.castShadow = true; shell.add(door);
      shell.userData = { part: 'shell', name: '堆叠一体机壳体', tag: 'SHELL', desc: '立式一体化储能柜，采用冷轧钢板+喷涂工艺，防护等级 IP55。', specs: ['215 kWh', 'IP55', '户外型', '立式'] };
      g.add(shell); parts.push(shell);

      // Battery stacks (5 layers)
      const stacks = [];
      for (let i=0;i<5;i++) {
        const stack = new THREE.Group(); stack.position.set(0, 0.25 + i*0.38, 0);
        const mod = new THREE.Mesh(new THREE.BoxGeometry(0.82, 0.32, 0.72), cellMat.clone()); mod.castShadow = true; stack.add(mod);
        const led = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.01, 0.01), cellEmissiveMat.clone());
        led.position.set(0.42, 0.1, 0.30); led.userData = { isLed: true, baseIntensity: 0.5, phase: i*0.5 }; stack.add(led);
        stack.userData = { part: 'stack' + i, name: '电池模组 L' + (i+1), tag: 'MODULE', desc: '磷酸铁锂堆叠模组，单模组 43kWh，支持即插即用。', specs: ['43 kWh', '768 Vdc', '≥8000 次', 'IP55'] };
        g.add(stack); stacks.push(stack); parts.push(stack);
      }

      // PCS/BMS top unit
      const topUnit = new THREE.Group(); topUnit.position.set(0, shellH - 0.22, 0);
      const pcs = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.18, 0.78), pcsMat); pcs.castShadow = true; topUnit.add(pcs);
      const bms = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.18, 0.78), bmsMat); bms.position.set(0, -0.20, 0); bms.castShadow = true; topUnit.add(bms);
      topUnit.userData = { part: 'pcs', name: '顶部 PCS + BMS', tag: 'CONTROL', desc: '顶部集成双向变流器与电池管理系统，最大功率 100kW。', specs: ['100 kW', '≥98.6%', 'IP54', '≤30ms'] };
      g.add(topUnit); parts.push(topUnit);

      // HVAC bottom
      const hvac = new THREE.Group(); hvac.position.set(0, 0.12, 0);
      const hvacBody = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.20, 0.78), hvacMat); hvacBody.castShadow = true; hvac.add(hvacBody);
      const fan = new THREE.Group(); fan.position.set(0, 0.11, 0.20);
      for (let i=0;i<4;i++) { const b = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.04, 0.01), darkMetalMat); b.rotation.z = i*Math.PI/2; fan.add(b); }
      hvac.add(fan); hvac.userData = { part: 'hvac', name: '底部空调系统', tag: 'HVAC', desc: '底部风冷散热，确保电芯温差 ≤3℃。', specs: ['ΔT≤3℃', '5kW', 'IP55', '-20~45℃'] };
      g.add(hvac); parts.push(hvac);

      // Labels
      const labels = new THREE.Group(); g.add(labels);
      addLabel(labels, 'PCS 100kW', 0, shellH - 0.12, 0.45);
      addLabel(labels, 'HVAC', 0, 0.25, 0.45);

      return { group: g, parts, animatables: { fan }, labels };
    }

    // ---------- Cabinet All-in-One ----------
    function buildCabinet() {
      const g = new THREE.Group();
      const parts = [];

      const cw = 1.6, ch = 2.0, cd = 1.0;
      // Shell
      const shell = new THREE.Group();
      const boxMat = shellMat.clone();
      const cBack = new THREE.Mesh(new THREE.BoxGeometry(cw, ch, 0.04), boxMat); cBack.position.set(0, ch/2, -cd/2); cBack.castShadow = true; shell.add(cBack);
      const cLeft = new THREE.Mesh(new THREE.BoxGeometry(0.04, ch, cd), boxMat); cLeft.position.set(-cw/2, ch/2, 0); cLeft.castShadow = true; shell.add(cLeft);
      const cRight = new THREE.Mesh(new THREE.BoxGeometry(0.04, ch, cd), boxMat); cRight.position.set(cw/2, ch/2, 0); cRight.castShadow = true; shell.add(cRight);

    // ===== Assemble products =====
    function createProduct(key, builder) {
      const data = builder();
      const group = data.group;
      group.visible = false;
      scene.add(group);

      // Store original positions for explosion
      const originalPos = new Map();
      data.parts.forEach(p => originalPos.set(p.uuid, p.position.clone()));

      // Particles
      const particleGroup = new THREE.Group(); scene.add(particleGroup);
      const coolGeo = new THREE.BufferGeometry();
      const coolCount = 60; const coolPos = new Float32Array(coolCount*3); const coolVel = [];
      for (let i=0;i<coolCount;i++) { coolPos[i*3]=0; coolPos[i*3+1]=0; coolPos[i*3+2]=0; coolVel.push({vx:0,vy:0,vz:0,life:0}); }
      coolGeo.setAttribute('position', new THREE.BufferAttribute(coolPos, 3));
      const coolMat = new THREE.PointsMaterial({color:0xaaddff, size:0.06, transparent:true, opacity:0.3, blending: THREE.AdditiveBlending});
      const coolParticles = new THREE.Points(coolGeo, coolMat); particleGroup.add(coolParticles);
      particleGroup.visible = false;

      products[key] = { group, parts: data.parts, originalPos, particleGroup, coolParticles, coolVel, animatables: data.animatables || {}, labels: data.labels || {} };
    }

    createProduct('stacked', buildStacked);
    createProduct('cabinet', buildCabinet);
    createProduct('container', buildContainer);

    let autoRotate = true, exploded = false, sectionMode = false, tourMode = false; let tourIndex = 0;
    const urlParams = new URLSearchParams(window.location.search);
    const initialProduct = ['stacked','cabinet','container'].includes(urlParams.get('product')) ? urlParams.get('product') : 'stacked';

    // ===== Switch product =====
    function switchProduct(key) {
      if (currentKey === key) return;
      // hide current
      products[currentKey].group.visible = false;
      products[currentKey].particleGroup.visible = false;
      // reset state
      autoRotate = true; exploded = false; sectionMode = false; tourMode = false; tourIndex = 0;
      updateBtnText();
      document.getElementById('info-panel').classList.add('hidden');
      // show new
      currentKey = key;
      Object.keys(products).forEach(k => { products[k].group.visible = (k===key); products[k].particleGroup.visible = (k===key); });
      // camera reset per product
      const camMap = { stacked: {pos:[3,2.5,5], target:[0,1.1,0]}, cabinet: {pos:[4,3,6], target:[0,1.0,0]}, container: {pos:[16,10,20], target:[0,0,0]} };
      const cfg = camMap[key];
      gsapTo(camera.position, {x:cfg.pos[0], y:cfg.pos[1], z:cfg.pos[2]}, 0.8);
      gsapTo(controls.target, {x:cfg.target[0], y:cfg.target[1], z:cfg.target[2]}, 0.8);
      // update tabs
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.key === key));
      // rebuild nav
      buildNav();
      // reset positions
      products[key].parts.forEach(p => { const orig = products[key].originalPos.get(p.uuid); p.position.copy(orig); });
      applySectionMode();
    }

    // ===== Interactions =====
    const raycaster = new THREE.Raycaster(); const mouse = new THREE.Vector2(); let hoveredObj = null;
    function findPartGroup(mesh) { let curr = mesh; while (curr) { if (curr.userData && curr.userData.part) return curr; curr = curr.parent; } return null; }
    function setEmissive(obj, value) { obj.traverse(child => { if (child.isMesh && child.material && child.material.emissive && !child.userData.isLed) { child.userData._origEmissive = child.userData._origEmissive || child.material.emissive.getHex(); child.material.emissive.setHex(value ? 0x00d9a5 : child.userData._origEmissive); child.material.emissiveIntensity = value ? 0.45 : 0; } }); }
    function onPointerMove(e) {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(products[currentKey].group.children, true);
      if (intersects.length > 0) {
        const group = findPartGroup(intersects[0].object);
        if (group && group !== hoveredObj) { if (hoveredObj) setEmissive(hoveredObj, false); hoveredObj = group; setEmissive(hoveredObj, true); document.body.style.cursor = 'pointer'; showTooltip(group.userData.name || '部件', e.clientX, e.clientY); }
      } else { if (hoveredObj) { setEmissive(hoveredObj, false); hoveredObj = null; document.body.style.cursor = 'default'; hideTooltip(); } }
    }
    function onClick(e) { mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1; raycaster.setFromCamera(mouse, camera); const intersects = raycaster.intersectObjects(products[currentKey].group.children, true); if (intersects.length > 0) { const group = findPartGroup(intersects[0].object); if (group) focusPart(group); } }
    window.addEventListener('mousemove', onPointerMove); window.addEventListener('click', onClick);

    const tooltip = document.getElementById('tooltip');
    function showTooltip(text, x, y) { tooltip.textContent = text; tooltip.classList.remove('hidden'); tooltip.style.left = (x + 12) + 'px'; tooltip.style.top = (y + 12) + 'px'; }
    function hideTooltip() { tooltip.classList.add('hidden'); }

    function showInfo(group) { const data = group.userData; if (!data || !data.part) return; document.getElementById('info-tag').textContent = data.tag || 'COMPONENT'; document.getElementById('info-title').textContent = data.name || '部件'; document.getElementById('info-desc').textContent = data.desc || ''; [1,2,3,4].forEach(i => document.getElementById('info-spec'+i).textContent = (data.specs && data.specs[i-1]) || '-'); const panel = document.getElementById('info-panel'); panel.classList.remove('hidden'); panel.classList.add('info-enter'); highlightNav(group.userData.part); }
    document.getElementById('btn-close-info').addEventListener('click', () => { document.getElementById('info-panel').classList.add('hidden'); });

    function focusPart(group) { autoRotate = false; tourMode = false; updateBtnText(); const box = new THREE.Box3().setFromObject(group); const center = box.getCenter(new THREE.Vector3()); const size = box.getSize(new THREE.Vector3()); const maxDim = Math.max(size.x, size.y, size.z); const dist = Math.max(maxDim * 1.8, 3.5); const offset = camera.position.clone().sub(controls.target).normalize().multiplyScalar(dist); const endPos = center.clone().add(offset); gsapTo(camera.position, {x:endPos.x, y:endPos.y, z:endPos.z}, 0.9); gsapTo(controls.target, {x:center.x, y:center.y, z:center.z}, 0.9); showInfo(group); }

    // Navigation
    const navContainer = document.getElementById('part-nav'); const navMap = new Map();
    function buildNav() {
      navContainer.innerHTML = ''; navMap.clear();
      const parts = products[currentKey].parts;
      // deduplicate by part key
      const seen = new Set();
      parts.forEach((p, idx) => {
        const key = p.userData.part;
        if (!key || seen.has(key)) return;
        seen.add(key);
        const el = document.createElement('div');
        el.className = 'nav-item px-3 py-2 rounded cursor-pointer text-sm text-slate-300 flex items-center justify-between';
        el.innerHTML = `<span>${p.userData.name}</span><span class="text-xs text-slate-500">${idx+1}</span>`;
        el.addEventListener('click', () => focusPart(p));
        navContainer.appendChild(el); navMap.set(key, el);
      });
    }
    function highlightNav(part) { navMap.forEach((el, key) => el.classList.toggle('active', key === part)); }

    // Buttons
    function updateBtnText() { document.getElementById('btn-rotate').textContent = autoRotate ? '停止旋转' : '自动旋转'; document.getElementById('btn-explode').textContent = exploded ? '合拢视图' : '爆炸图'; document.getElementById('btn-section').textContent = sectionMode ? '关闭剖面' : '剖面视图'; document.getElementById('btn-tour').innerHTML = tourMode ? '<span class="w-2 h-2 rounded-full bg-black/60 pulse-dot"></span> 停止导览' : '<span class="w-2 h-2 rounded-full bg-black/60 pulse-dot"></span> 开启自动导览'; }
    document.getElementById('btn-rotate').addEventListener('click', () => { autoRotate = !autoRotate; if (tourMode) tourMode = false; updateBtnText(); });
    document.getElementById('btn-explode').addEventListener('click', toggleExplode);
    document.getElementById('btn-section').addEventListener('click', () => { sectionMode = !sectionMode; updateBtnText(); applySectionMode(); });
    document.getElementById('btn-reset').addEventListener('click', resetView);
    document.getElementById('btn-tour').addEventListener('click', () => { tourMode = !tourMode; if (tourMode) { autoRotate = false; exploded = false; updateBtnText(); resetPositions(); applySectionMode(); tourIndex = 0; tourNext(); } else { updateBtnText(); } });
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchProduct(btn.dataset.key)));

    function resetPositions() { products[currentKey].parts.forEach(p => { const orig = products[currentKey].originalPos.get(p.uuid); p.position.copy(orig); }); }
    function applySectionMode() {
      const prod = products[currentKey];
      prod.parts.forEach(p => {
        if (p.userData.part === 'shell') {
          p.traverse(child => {
            if (child.isMesh && child.geometry.type === 'BoxGeometry') {
              child.material = sectionMode ? shellCutawayMat.clone() : shellMat.clone();
              if (sectionMode) { child.material.transparent = true; child.material.opacity = 0.10; child.material.side = THREE.DoubleSide; child.material.depthWrite = false; }
            }
          });
        }
      });
    }

    function toggleExplode() {
      exploded = !exploded; updateBtnText();
      const prod = products[currentKey];
      if (currentKey === 'stacked') {
        if (exploded) {
          prod.parts.filter(p => p.userData.part && p.userData.part.startsWith('stack')).forEach((p, i) => { gsapTo(p.position, { x: p.position.x, y: p.position.y + 0.15 + i*0.25, z: p.position.z + 0.2 }, 0.8); });
          const topUnit = prod.parts.find(p => p.userData.part === 'pcs'); if (topUnit) gsapTo(topUnit.position, { x: topUnit.position.x, y: topUnit.position.y + 0.6, z: topUnit.position.z + 0.2 }, 0.8);
          const hvac = prod.parts.find(p => p.userData.part === 'hvac'); if (hvac) gsapTo(hvac.position, { x: hvac.position.x, y: hvac.position.y - 0.3, z: hvac.position.z + 0.2 }, 0.8);
          const shell = prod.parts.find(p => p.userData.part === 'shell'); if (shell) gsapTo(shell.position, { x: shell.position.x, y: shell.position.y, z: shell.position.z - 0.6 }, 0.8);
        } else { resetPositions(); }
      } else if (currentKey === 'cabinet') {
        if (exploded) {
          const racks = prod.parts.filter(p => p.userData.part && p.userData.part.startsWith('rack'));
          racks.forEach((p, i) => { gsapTo(p.position, { x: p.position.x + (i===0 ? -0.6 : 0.6), y: p.position.y, z: p.position.z + 0.3 }, 0.8); });
          const pcs = prod.parts.find(p => p.userData.part === 'pcs'); if (pcs) gsapTo(pcs.position, { x: pcs.position.x + 0.4, y: pcs.position.y, z: pcs.position.z + 0.3 }, 0.8);
          const bms = prod.parts.find(p => p.userData.part === 'bms'); if (bms) gsapTo(bms.position, { x: bms.position.x + 0.4, y: bms.position.y, z: bms.position.z + 0.3 }, 0.8);
          const hvac = prod.parts.find(p => p.userData.part === 'hvac'); if (hvac) gsapTo(hvac.position, { x: hvac.position.x - 0.4, y: hvac.position.y, z: hvac.position.z + 0.3 }, 0.8);
          const fire = prod.parts.find(p => p.userData.part === 'fire'); if (fire) gsapTo(fire.position, { x: fire.position.x, y: fire.position.y + 0.3, z: fire.position.z + 0.2 }, 0.8);
          const shell = prod.parts.find(p => p.userData.part === 'shell'); if (shell) gsapTo(shell.position, { x: shell.position.x, y: shell.position.y, z: shell.position.z - 0.6 }, 0.8);
        } else { resetPositions(); }
      } else if (currentKey === 'container') {
        if (exploded) {
          const racks = prod.parts.filter(p => p.userData.part === 'battery');
          racks.forEach((p, i) => { const dir = (i < 2) ? -1 : 1; const offset = (i % 2 === 0) ? 1.9 : 0.85; gsapTo(p.position, { x: prod.originalPos.get(p.uuid).x + dir * offset, y: prod.originalPos.get(p.uuid).y + 0.45, z: prod.originalPos.get(p.uuid).z + 0.45 }, 0.8); });
          const pcs = prod.parts.find(p => p.userData.part === 'pcs'); if (pcs) gsapTo(pcs.position, { x: prod.originalPos.get(pcs.uuid).x + 2.0, y: prod.originalPos.get(pcs.uuid).y, z: prod.originalPos.get(pcs.uuid).z + 0.9 }, 0.8);
          const bms = prod.parts.find(p => p.userData.part === 'bms'); if (bms) gsapTo(bms.position, { x: prod.originalPos.get(bms.uuid).x + 2.9, y: prod.originalPos.get(bms.uuid).y, z: prod.originalPos.get(bms.uuid).z + 0.8 }, 0.8);
          const hvac = prod.parts.find(p => p.userData.part === 'hvac'); if (hvac) gsapTo(hvac.position, { x: prod.originalPos.get(hvac.uuid).x - 2.0, y: prod.originalPos.get(hvac.uuid).y, z: prod.originalPos.get(hvac.uuid).z + 0.8 }, 0.8);
        } else { resetPositions(); }
      }
    }

    function resetView() { autoRotate = false; exploded = false; sectionMode = false; tourMode = false; applySectionMode(); updateBtnText(); resetPositions(); const cfg = { stacked: {pos:[3,2.5,5], target:[0,1.1,0]}, cabinet: {pos:[4,3,6], target:[0,1.0,0]}, container: {pos:[16,10,20], target:[0,0,0]} }[currentKey]; gsapTo(camera.position, {x:cfg.pos[0], y:cfg.pos[1], z:cfg.pos[2]}, 0.8); gsapTo(controls.target, {x:cfg.target[0], y:cfg.target[1], z:cfg.target[2]}, 0.8); document.getElementById('info-panel').classList.add('hidden'); highlightNav(null); }

    let tourTimer = null;
    function tourNext() { if (!tourMode) return; const parts = products[currentKey].parts; const order = parts.map(p => p.userData.part).filter((v,i,a) => v && a.indexOf(v)===i); const key = order[tourIndex % order.length]; const target = parts.find(p => p.userData.part === key); if (target) { if (currentKey !== 'container' && !exploded) { toggleExplode(); } focusPart(target); } tourIndex++; tourTimer = setTimeout(tourNext, 4500); }

    window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); toggleExplode(); } if (e.key === 'r' || e.key === 'R') resetView(); if (e.key === 'Tab') { e.preventDefault(); document.getElementById('btn-section').click(); } if (e.key >= '1' && e.key <= '6') { const idx = parseInt(e.key)-1; const el = navContainer.children[idx]; if (el) el.click(); } });

    // Tweens
    const tweens = [];
    function gsapTo(target, endProps, durationSeconds) { const startProps = {}; for (const k in endProps) startProps[k] = target[k]; tweens.push({ target, startProps, endProps, duration: durationSeconds, elapsed: 0 }); }

    // Stats simulation
    let statT = 0;
    function updateStats(dt) {
      statT += dt;
      const soc = 55 + 35 * Math.sin(statT * 0.3);
      const power = 200 + 350 * Math.abs(Math.sin(statT * 0.5 + 1));
      const temp = 24 + 6 * Math.sin(statT * 0.2 + 2);
      document.getElementById('stat-soc').textContent = soc.toFixed(1) + '%'; document.getElementById('bar-soc').style.width = Math.max(0, Math.min(100, soc)) + '%';
      document.getElementById('stat-power').textContent = power.toFixed(0) + ' kW'; document.getElementById('bar-power').style.width = Math.max(0, Math.min(100, power / 630 * 100)) + '%';
      document.getElementById('stat-temp').textContent = temp.toFixed(1) + ' ℃'; document.getElementById('bar-temp').style.width = Math.max(0, Math.min(100, (temp - 15) / 25 * 100)) + '%';
    }

    // Animation loop
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta(); const time = clock.getElapsedTime();
      const prod = products[currentKey];
      if (autoRotate) prod.group.rotation.y += dt * 0.10;

      // fan rotation
      if (prod.animatables.fan) prod.animatables.fan.rotation.z += dt * 8;

      // led pulse
      prod.group.traverse(child => { if (child.userData && child.userData.isLed && child.material && child.material.emissive) { const base = child.userData.baseIntensity || 0.4; const phase = child.userData.phase || 0; child.material.emissiveIntensity = base + 0.15 * Math.sin(time * 3 + phase); } });

      // cooling particles (simple generic updraft from HVAC)
      const cPos = prod.coolParticles.geometry.attributes.position.array;
      let hvacPos = new THREE.Vector3();
      const hvacPart = prod.parts.find(p => p.userData.part === 'hvac');
      if (hvacPart) hvacPart.getWorldPosition(hvacPos);
      for (let i=0;i<60;i++) {
        if (hvacPart) {
          cPos[i*3] += prod.coolVel[i].vx * dt; cPos[i*3+1] += prod.coolVel[i].vy * dt; cPos[i*3+2] += prod.coolVel[i].vz * dt; prod.coolVel[i].life -= dt * 0.5;
          if (prod.coolVel[i].life <= 0) {
            cPos[i*3] = hvacPos.x + (Math.random()-0.5)*0.6; cPos[i*3+1] = hvacPos.y + 0.2; cPos[i*3+2] = hvacPos.z + (Math.random()-0.5)*0.4;
            prod.coolVel[i].life = 1.0;
            if (currentKey === 'stacked') { prod.coolVel[i].vx = (Math.random()-0.5)*0.2; prod.coolVel[i].vy = 0.6 + Math.random()*0.4; prod.coolVel[i].vz = (Math.random()-0.5)*0.2; }
            else if (currentKey === 'cabinet') { prod.coolVel[i].vx = 0.5 + Math.random()*0.3; prod.coolVel[i].vy = (Math.random()-0.5)*0.2; prod.coolVel[i].vz = (Math.random()-0.5)*0.2; }
            else { prod.coolVel[i].vx = 0.7 + Math.random()*0.6; prod.coolVel[i].vy = (Math.random()-0.5)*0.1; prod.coolVel[i].vz = (Math.random()-0.5)*0.25; }
          }
        } else { cPos[i*3]=0; cPos[i*3+1]=-100; cPos[i*3+2]=0; }
      }
      prod.coolParticles.geometry.attributes.position.needsUpdate = true;

      // tweens
      for (let i = tweens.length - 1; i >= 0; i--) { const t = tweens[i]; t.elapsed += dt; const p = Math.min(t.elapsed / t.duration, 1); const ease = 1 - Math.pow(1 - p, 3); for (const k in t.endProps) t.target[k] = t.startProps[k] + (t.endProps[k] - t.startProps[k]) * ease; if (p >= 1) tweens.splice(i, 1); }

      updateStats(dt); controls.update(); composer.render(); cssRenderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); cssRenderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Init
    switchProduct(initialProduct);
  </script>
</body>
</html>
